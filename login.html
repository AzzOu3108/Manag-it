</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Manag'it</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <a href="index.html" class="back-link">
        <svg width="24" height="24" viewBox="0 0 24 24">
            <path d="M15 18l-6-6 6-6" />
        </svg>
    </a>

    <div class="auth-container">
        <div class="auth-text-section">
            <h1>Welcome Back! Let's<br>Get Back to Managing.</h1>
            <p>Transform the way your team plans, collaborates,<br>and achieves success.</p>
        </div>
        
        <div class="auth-form-section">
            <div class="auth-form-card">
                <div class="logo-container">
                    <img src="Landing-assets/Landing-assets/All-Logos/logo.svg" alt="Manag'it">
                </div>
                
                <form action="#">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="Exemple@gmail.com">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="**************">
                            <div class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        Login 
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                    
                    <div class="auth-switch">
                        You don't have an account ? <a href="signup.html">Sign Up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
